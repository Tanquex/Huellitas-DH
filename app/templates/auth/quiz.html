{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto py-12 px-4">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 px-8 py-6">
            <h2 class="text-2xl font-bold text-white">Solicitud de Verificación</h2>
            <p class="text-indigo-100">Contesta con honestidad para evaluar tu perfil de adoptante.</p>
        </div>

        <form action="{{ url_for('auth.take_quiz') }}" method="POST" class="p-8 space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">¿En qué tipo de vivienda habitas?</label>
                <select name="vivienda" required class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    <option value="Casa propia">Casa propia</option>
                    <option value="Departamento">Departamento</option>
                    <option value="Casa rentada">Casa rentada (con permiso de mascotas)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">¿Cuentas con patio o jardín cercado?</label>
                <div class="flex space-x-4">
                    <label class="flex items-center"><input type="radio" name="espacio" value="Si" class="mr-2" required> Sí</label>
                    <label class="flex items-center"><input type="radio" name="espacio" value="No" class="mr-2"> No</label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">¿Cuántas horas al día pasará la mascota sola?</label>
                <input type="number" name="tiempo" min="0" max="24" required class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="Ej: 4">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">¿Estás consciente de los gastos de alimentación y salud (vacunas, esterilización)?</label>
                <div class="flex space-x-4">
                    <label class="flex items-center"><input type="radio" name="presupuesto" value="Si" class="mr-2" required> Sí</label>
                    <label class="flex items-center"><input type="radio" name="presupuesto" value="No" class="mr-2"> No</label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Cuéntanos sobre tu experiencia previa con mascotas:</label>
                <textarea name="experiencia" rows="3" required class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="He tenido perros antes..."></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition duration-200">
                    Enviar para Evaluación con IA
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
